name: Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      COSMIC_API_BASE_URL: ${{ secrets.COSMIC_API_BASE_URL }}
      COSMIC_CACHE_KV_ID: ${{ secrets.COSMIC_CACHE_KV_ID }}
      COSMIC_CACHE_PREVIEW_KV_ID: ${{ secrets.COSMIC_CACHE_PREVIEW_KV_ID }}
      COSMIC_PAGES_URL: ${{ secrets.COSMIC_PAGES_URL }}
      ADMIN_REFRESH_TOKEN: ${{ secrets.ADMIN_REFRESH_TOKEN }}
      VITE_API_BASE_URL: ${{ secrets.COSMIC_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm --workspace packages/data run fetch:sources
      - run: npm run data:generate
      - run: npm run cloudflare:configure
      - run: npm run typecheck
      - run: npm run test
      - run: npm --workspace apps/api run deploy
      - run: npm run data:publish
      - run: npm --workspace apps/web run build
      - run: npm run audit:cloudflare
      - run: npm --workspace apps/web run deploy
      - run: npm run smoke:live
